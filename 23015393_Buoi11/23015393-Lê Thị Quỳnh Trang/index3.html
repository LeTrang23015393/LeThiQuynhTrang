<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Tour Du Lịch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            padding: 20px;
        }

        .container {
            max-width: 500px;
        }

        h1 {
            color: #000;
            margin-bottom: 20px;
            font-size: 32px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #000;
            font-size: 16px;
        }

        input[type="text"],
        input[type="tel"],
        input[type="email"],
        input[type="date"],
        input[type="number"],
        select,
        textarea {
            width: 200px;
            padding: 5px;
            border: 1px solid #000;
            background: #fff;
            font-size: 16px;
            font-family: inherit;
        }

        select {
            width: 160px;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
            width: 360px;
        }

        .error {
            border-color: #e74c3c !important;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .btn-submit {
            padding: 8px 20px;
            background: #d3d3d3;
            color: #000;
            border: 1px solid #000;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #c0c0c0;
        }

        /* Modal/Popup styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal.show {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 100px;
        }

        .modal-content {
            background-color: #fff;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            min-width: 400px;
        }

        .modal-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .modal-body {
            margin-bottom: 25px;
            color: #666;
            font-size: 14px;
        }

        .modal-footer {
            text-align: right;
        }

        .btn-ok {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-ok:hover {
            background: #1557b0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Form đặt tour hoàn chỉnh</h1>

        <form id="tourForm" novalidate>
            <div class="form-group">
                <label for="fullName">Họ tên khách hàng:</label>
                <input type="text" id="fullName" name="fullName">
                <div class="error-message" id="errorFullName">Họ tên không được để trống</div>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone">
                <div class="error-message" id="errorPhone">Số điện thoại không được để trống</div>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
                <div class="error-message" id="errorEmail">Email không được để trống</div>
            </div>

            <div class="form-group">
                <label for="destination">Chọn điểm đến:</label>
                <select id="destination" name="destination">
                    <option value="">-- Chọn điểm đến --</option>
                    <option value="dalat">Đà Lạt</option>
                    <option value="nhatrang">Nha Trang</option>
                    <option value="phuquoc">Phú Quốc</option>
                    <option value="danang">Đà Nẵng</option>
                    <option value="halong">Hạ Long</option>
                    <option value="sapa">Sa Pa</option>
                    <option value="hoian">Hội An</option>
                </select>
                <div class="error-message" id="errorDestination">Phải chọn điểm đến</div>
            </div>

            <div class="form-group">
                <label for="departureDate">Ngày khởi hành:</label>
                <input type="date" id="departureDate" name="departureDate">
                <div class="error-message" id="errorDate">Ngày khởi hành không được để trống</div>
            </div>

            <div class="form-group">
                <label for="numPeople">Số người:</label>
                <input type="number" id="numPeople" name="numPeople" min="1">
                <div class="error-message" id="errorNumPeople">Số người phải lớn hơn 0</div>
            </div>

            <div class="form-group">
                <label for="notes">Ghi chú:</label>
                <textarea id="notes" name="notes"></textarea>
            </div>

            <button type="submit" class="btn-submit">Đặt tour</button>
        </form>
    </div>

    <!-- Modal Popup -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">This page says</div>
            <div class="modal-body">Thông tin đặt tour đã hợp lệ</div>
            <div class="modal-footer">
                <button class="btn-ok" onclick="closeModal()">OK</button>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('tourForm');
        const successModal = document.getElementById('successModal');

        // Lấy các trường input
        const fullName = document.getElementById('fullName');
        const phone = document.getElementById('phone');
        const email = document.getElementById('email');
        const destination = document.getElementById('destination');
        const departureDate = document.getElementById('departureDate');
        const numPeople = document.getElementById('numPeople');

        // Lấy các thông báo lỗi
        const errorFullName = document.getElementById('errorFullName');
        const errorPhone = document.getElementById('errorPhone');
        const errorEmail = document.getElementById('errorEmail');
        const errorDestination = document.getElementById('errorDestination');
        const errorDate = document.getElementById('errorDate');
        const errorNumPeople = document.getElementById('errorNumPeople');

        // Hàm xóa lỗi
        function clearError(input, errorElement) {
            input.classList.remove('error');
            errorElement.classList.remove('show');
        }

        // Hàm hiển thị lỗi
        function showError(input, errorElement) {
            input.classList.add('error');
            errorElement.classList.add('show');
        }

        // Hàm đóng modal
        function closeModal() {
            successModal.classList.remove('show');
        }

        // Xóa lỗi khi người dùng nhập
        fullName.addEventListener('input', () => clearError(fullName, errorFullName));
        phone.addEventListener('input', () => clearError(phone, errorPhone));
        email.addEventListener('input', () => clearError(email, errorEmail));
        destination.addEventListener('change', () => clearError(destination, errorDestination));
        departureDate.addEventListener('change', () => clearError(departureDate, errorDate));
        numPeople.addEventListener('input', () => clearError(numPeople, errorNumPeople));

        // Xử lý submit form
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            let isValid = true;

            // Kiểm tra họ tên
            if (fullName.value.trim() === '') {
                showError(fullName, errorFullName);
                isValid = false;
            } else {
                clearError(fullName, errorFullName);
            }

            // Kiểm tra số điện thoại
            if (phone.value.trim() === '') {
                showError(phone, errorPhone);
                isValid = false;
            } else {
                clearError(phone, errorPhone);
            }

            // Kiểm tra email
            if (email.value.trim() === '') {
                showError(email, errorEmail);
                isValid = false;
            } else {
                clearError(email, errorEmail);
            }

            // Kiểm tra điểm đến
            if (destination.value === '') {
                showError(destination, errorDestination);
                isValid = false;
            } else {
                clearError(destination, errorDestination);
            }

            // Kiểm tra ngày khởi hành
            if (departureDate.value === '') {
                showError(departureDate, errorDate);
                isValid = false;
            } else {
                clearError(departureDate, errorDate);
            }

            // Kiểm tra số người
            if (numPeople.value === '' || parseInt(numPeople.value) <= 0) {
                showError(numPeople, errorNumPeople);
                isValid = false;
            } else {
                clearError(numPeople, errorNumPeople);
            }

            // Nếu tất cả hợp lệ
            if (isValid) {
                successModal.classList.add('show');
            }
        });

        // Đóng modal khi click bên ngoài
        window.onclick = function(event) {
            if (event.target == successModal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
