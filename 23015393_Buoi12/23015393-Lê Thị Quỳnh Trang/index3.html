<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chọn Tour</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background-color: #e8e8e8;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 50px;
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
            font-size: 42px;
            font-weight: bold;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .tours-wrapper {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .tour-item {
            background-color: #f5f5f5;
            border: 1px solid #ccc;
            padding: 25px;
            flex: 1;
            transition: background-color 0.3s;
        }

        .tour-item.selected {
            background-color: #fffacd;
        }

        .tour-item h2 {
            font-size: 30px;
            margin-bottom: 15px;
            color: #333;
            font-weight: bold;
        }

        .tour-item p {
            color: #666;
            font-size: 21px;
            line-height: 1.5;
            margin-bottom: 20px;
            min-height: 40px;
        }

        .tour-item button {
            padding: 10px 22px;
            background-color: #e0e0e0;
            color: #333;
            border: 1px solid #999;
            cursor: pointer;
            font-size: 21px;
            font-weight: normal;
        }

        .tour-item button:hover {
            background-color: #d0d0d0;
        }

        .notification {
            padding: 10px 0;
        }

        .notification p {
            color: #0066cc;
            font-size: 23px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chọn tour yêu thích</h1>

        <div class="tours-wrapper">
            <div class="tour-item" id="tour1">
                <h2>Tour Đà Lạt</h2>
                <p>Thành phố ngàn hoa, khí hậu mát mẻ.</p>
                <button onclick="selectTour('tour1', 'Tour Đà Lạt')">Chọn tour</button>
            </div>

            <div class="tour-item" id="tour2">
                <h2>Tour Phú Quốc</h2>
                <p>Nghỉ dưỡng biển đảo, phù hợp cho gia đình.</p>
                <button onclick="selectTour('tour2', 'Tour Phú Quốc')">Chọn tour</button>
            </div>

            <div class="tour-item" id="tour3">
                <h2>Tour Hà Nội</h2>
                <p>Tham quan thủ đô, phố cổ và các di tích lịch sử.</p>
                <button onclick="selectTour('tour3', 'Tour Hà Nội')">Chọn tour</button>
            </div>
        </div>

        <div class="notification">
            <p id="message">Bạn chưa chọn tour nào.</p>
        </div>
    </div>

    <script>
        function selectTour(tourId, tourName) {
            // Xóa class selected khỏi tất cả các tour
            const allTours = document.querySelectorAll('.tour-item');
            allTours.forEach(tour => {
                tour.classList.remove('selected');
            });

            // Thêm class selected cho tour được chọn
            document.getElementById(tourId).classList.add('selected');

            // Cập nhật thông báo
            document.getElementById('message').textContent = 'Bạn đã chọn ' + tourName;
        }
    </script>
</body>
</html>
