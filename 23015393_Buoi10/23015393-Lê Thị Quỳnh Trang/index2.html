<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính tiền tour du lịch</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <h1>Tính tiền tour du lịch</h1>
        
        <div class="price-info">
            <p>Giá tour: 2.000.000 VNĐ/người</p>
        </div>
        
        <div class="input-section">
            <label for="numPeople">Nhập số người:</label>
            <input type="number" id="numPeople" min="1" placeholder="Nhập số người">
        </div>
        
        <button onclick="calculateTotal()">Tính tiền</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        function calculateTotal() {
            const numPeople = document.getElementById('numPeople').value;
            const pricePerPerson = 2000000;
            
            if (numPeople && numPeople > 0) {
                const total = numPeople * pricePerPerson;
                document.getElementById('result').innerHTML = 
                    `Tổng tiền tour là: ${total.toLocaleString('vi-VN')} VNĐ`;
            } else {
                document.getElementById('result').innerHTML = 
                    'Vui lòng nhập số người hợp lệ!';
            }
        }
    </script>
</body>
</html>
